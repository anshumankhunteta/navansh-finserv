name: Weekly Newsletter Generation

on:
  schedule:
    - cron: '30 2 * * 1'       # 02:30 UTC = 8:00 AM IST, every Monday
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Newsletter Generation
        run: |
          curl -sS -f --max-time 60 -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/newsletter/generate" \
            | jq . || exit 1
